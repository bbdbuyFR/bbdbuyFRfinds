<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBDBUY FR FINDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
        select {
            background-repeat: no-repeat; background-position: right 8px center;
            -webkit-appearance: none; appearance: none;
        }
        .price-tag {
            background: #10b981;
            color: white;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 13px;
        }
        /* Style des nouveaux tags flashy */
        .tag-categorie-flash {
            background: #00e5ff;
            color: #000000;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
        }
        .tag-vendeur-flash {
            background: #ff6d00;
            color: #ffffff;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
        }
        .dark select { background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>"); }
    </style>
</head>
<body class="font-sans antialiased bg-white text-gray-900 dark:bg-[#0f172a] dark:text-gray-200 transition-colors duration-300">

    <header class="bg-gray-100 dark:bg-[#1e293b] p-4 flex flex-col md:flex-row justify-between items-center border-b border-gray-300 dark:border-gray-800 sticky top-0 z-40 gap-4">
        <div class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
            <div class="text-center sm:text-left">
                <span class="text-xl font-extrabold tracking-tight text-gray-900 dark:text-white block uppercase">BbdBuy FR Finds</span>
                <span class="text-[10px] text-emerald-500 font-bold tracking-widest uppercase">Select Premium Links</span>
            </div>
            
            <div class="flex items-center space-x-3">
                <a href="https://discord.gg/sFbvd6J6Kr" target="_blank" class="w-10 h-10 bg-[#5865F2] rounded-xl flex items-center justify-center text-white text-xl hover:scale-110 transition-all shadow-lg" title="Discord">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <a href="#" target="_blank" class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-white text-xl border border-gray-700 hover:scale-110 transition-all shadow-lg" title="TikTok">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
                <a href="https://www.bbdbuyeu.com/register?inviteCode=QLjYvT" target="_blank" class="w-10 h-10 bg-[#ff9900] rounded-xl flex flex-col items-center justify-center text-black font-extrabold text-[9px] leading-tight hover:scale-110 transition-all shadow-lg" title="S'inscrire">
                    <span>BBD</span><span class="bg-black text-[#ff9900] px-0.5 rounded-[2px]">BUY</span>
                </a>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-center md:justify-end">
            <input type="text" id="search" placeholder="Rechercher..." class="bg-white dark:bg-[#1e293b] text-sm border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-2 w-full sm:w-40 focus:ring-2 focus:ring-emerald-500 outline-none">
            
            <select id="filter-staff" class="bg-white dark:bg-[#1e293b] text-xs border border-gray-300 dark:border-gray-700 rounded-xl px-3 py-2 outline-none">
                <option value="tous">Tous les articles</option>
                <option value="staff">Acheté par le Staff</option>
            </select>

            <select id="filter-vendeur" class="bg-white dark:bg-[#1e293b] text-xs border border-gray-300 dark:border-gray-700 rounded-xl px-3 py-2 outline-none">
                <option value="tous">Vendeurs</option>
                <option value="ccoo">CCOO</option><option value="jhy">JHY</option>
                <option value="mr q">Mr Q</option><option value="xinstore">Xinstore</option>
                <option value="football fire">Football Fire</option>
            </select>

            <select id="filter-categorie" class="bg-white dark:bg-[#1e293b] text-xs border border-gray-300 dark:border-gray-700 rounded-xl px-3 py-2 outline-none">
                <option value="toutes">Catégories</option>
                <option value="PULL">PULL</option><option value="BAS">BAS</option>
                <option value="CHAUSSURES">CHAUSSURES</option><option value="ACCESSOIRES">ACCESSOIRES</option>
                <option value="T-SHIRT">T-SHIRT</option><option value="MANTEAU">MANTEAU</option>
            </select>

            <button id="theme-toggle" class="w-10 h-10 rounded-xl bg-gray-200 dark:bg-[#1e293b] border border-gray-300 dark:border-gray-700 flex items-center justify-center transition-all">
                <i id="theme-icon" class="text-lg"></i>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 min-h-screen">
        <div id="content-area" class="space-y-12"></div>
    </main>

    <div id="product-modal" class="modal fixed inset-0 bg-black/90 items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-[#1e293b] p-8 rounded-3xl max-w-lg w-full text-center relative border border-gray-200 dark:border-gray-800 shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-extrabold text-gray-900 dark:text-white mb-2"></h3>
            <p id="modal-meta" class="text-xs text-gray-500 font-bold mb-8 tracking-widest"></p>
            
            <div id="modal-staff-box" class="hidden mb-8 p-5 bg-[#2563eb1a] border-l-4 border-blue-500 rounded-r-xl text-left flex gap-4">
                <div class="bg-[#5865F2] w-10 h-10 rounded-full flex items-center justify-center text-white shrink-0 shadow-lg">
                    <i class="fa-brands fa-discord"></i>
                </div>
                <div class="space-y-1">
                    <h4 class="text-sm font-extrabold text-blue-500 uppercase tracking-tight">Article déjà acheté et reçu par le Staff !</h4>
                    <p class="text-[11px] text-gray-800 dark:text-gray-300 leading-relaxed font-medium">
                        Nous avons cet article en main ! Rejoignez notre Discord et <strong>mentionnez un membre du staff</strong> pour voir des photos portées ou sous différents angles.
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <a id="modal-btn-agent" href="#" target="_blank" class="bg-emerald-500 text-white font-extrabold py-4 rounded-2xl hover:bg-emerald-600 transition-all shadow-lg shadow-emerald-500/20">Lien Agent BBD</a>
                <a id="modal-btn-source" href="#" target="_blank" class="bg-gray-100 dark:bg-[#0f172a] text-gray-900 dark:text-white font-extrabold py-4 rounded-2xl border border-gray-300 dark:border-gray-700 hover:bg-gray-200 transition-all">Lien Source (Weidian)</a>
            </div>
            
            <button onclick="closeProductModal()" class="mt-8 text-xs text-gray-500 hover:text-red-500 font-black uppercase transition-colors tracking-tighter">Fermer</button>
        </div>
    </div>

    <script>
        let tousLesProduits = [];
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        function updateThemeIcon() {
            if (html.classList.contains('dark')) {
                themeIcon.className = 'fa-solid fa-sun text-yellow-400';
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.className = 'fa-solid fa-moon text-blue-900';
                localStorage.setItem('theme', 'light');
            }
        }
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') html.classList.remove('dark');
        updateThemeIcon();
        themeBtn.addEventListener('click', () => { html.classList.toggle('dark'); updateThemeIcon(); });

        fetch('produits.json')
            .then(res => res.json())
            .then(data => { 
                // Filtrer pour retirer d'office les lignes vides du JSON
                tousLesProduits = data.filter(p => p.categorie && p.categorie.trim() !== ""); 
                updateGrid(); 
            })
            .catch(err => console.error(err));

        function updateGrid() {
            const search = document.getElementById('search').value.toLowerCase();
            const staff = document.getElementById('filter-staff').value;
            const vendor = document.getElementById('filter-vendeur').value.toLowerCase();
            const cat = document.getElementById('filter-categorie').value;

            const filtered = tousLesProduits.filter(p => {
                const matchSearch = p.nom.toLowerCase().includes(search);
                const matchStaff = (staff === 'tous') || (p.acheteParStaff === true);
                const matchVendor = (vendor === 'tous') || (p.vendeur.toLowerCase() === vendor);
                const matchCat = (cat === 'toutes') || (p.categorie === cat);
                return matchSearch && matchStaff && matchVendor && matchCat;
            });
            renderGrid(filtered);
        }

        function renderGrid(produits) {
            const area = document.getElementById('content-area');
            area.innerHTML = '';
            const groups = {};
            
            // Regroupe par catégorie pour ne plus jamais avoir de doublons
            produits.forEach(p => { 
                if(!groups[p.categorie]) groups[p.categorie] = []; 
                groups[p.categorie].push(p); 
            });

            for (const name in groups) {
                const section = document.createElement('section');
                section.innerHTML = `<h2 class="text-xs font-black mb-6 text-emerald-500 uppercase tracking-[0.3em]">${name}</h2>`;
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6";

                groups[name].forEach(p => {
                    const card = document.createElement('div');
                    // Hauteur fixe à h-[360px] pour des carrés/rectangles alignés à la perfection
                    card.className = "bg-gray-50 dark:bg-[#1e293b] h-[360px] rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-800 cursor-pointer hover:scale-[1.03] transition-all flex flex-col shadow-lg";
                    card.onclick = () => openModal(p);
                    
                    card.innerHTML = `
                        <div class="relative aspect-square bg-[#121212]">
                            <span class="absolute top-3 left-3 price-tag shadow-md">${p.prix}</span>
                            ${p.acheteParStaff ? `<span class="absolute top-3 right-3 bg-[#5865F2] text-white text-[9px] font-black px-2 py-1 rounded-lg z-10 flex items-center gap-1 uppercase"><i class="fa-brands fa-discord"></i> Staff</span>` : ''}
                            <img src="${p.image}" class="w-full h-full object-contain" loading="lazy">
                        </div>
                        <div class="p-4 flex-1 flex flex-col justify-between overflow-hidden">
                            <h4 class="font-bold text-xs text-gray-900 dark:text-white leading-tight line-clamp-2">${p.nom}</h4>
                            <div class="flex flex-wrap gap-2 mt-auto">
                                <span class="tag-categorie-flash">${p.categorie}</span>
                                ${p.vendeur ? `<span class="tag-vendeur-flash">${p.vendeur}</span>` : ''}
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                section.appendChild(grid); area.appendChild(section);
            }
        }

        function openModal(p) {
            document.getElementById('modal-title').innerText = p.nom;
            document.getElementById('modal-meta').innerText = `${p.categorie} • VENDEUR: ${p.vendeur}`;
            document.getElementById('modal-btn-agent').href = p.lienAgent;
            document.getElementById('modal-btn-source').href = p.lienSource;
            const staffBox = document.getElementById('modal-staff-box');
            if (p.acheteParStaff) staffBox.classList.remove('hidden'); else staffBox.classList.add('hidden');
            document.getElementById('product-modal').classList.add('active');
        }

        function closeProductModal() { document.getElementById('product-modal').classList.remove('active'); }

        document.getElementById('search').addEventListener('input', updateGrid);
        document.getElementById('filter-staff').addEventListener('change', updateGrid);
        document.getElementById('filter-vendeur').addEventListener('change', updateGrid);
        document.getElementById('filter-categorie').addEventListener('change', updateGrid);
    </script>
</body>
</html>
