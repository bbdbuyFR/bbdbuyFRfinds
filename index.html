<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Meilleures Finds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #ffffff; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="font-sans antialiased">

    <header class="bg-[#1a1a1a] p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <span class="text-xl font-bold tracking-wider text-white">MY FINDS</span>
            <span class="text-xs text-gray-400 hidden sm:inline">Les meilleurs liens !</span>
        </div>
        <input type="text" id="search" placeholder="Rechercher un produit..." class="bg-[#2a2a2a] text-sm rounded px-4 py-2 w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <h2 class="text-xl font-bold mb-6 text-gray-400 tracking-wide uppercase">Pull</h2>
        
        <div id="grid-produits" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            </div>
    </main>

    <div id="product-modal" class="modal fixed inset-0 bg-black/80 items-center justify-center z-50 p-4">
        <div class="bg-[#222] p-6 rounded-xl max-w-sm w-full text-center relative border border-gray-800">
            <h3 id="modal-title" class="text-xl font-bold mb-1">Nom du produit</h3>
            <p id="modal-meta" class="text-xs text-gray-400 mb-6">Catégorie • Vendeur</p>
            
            <a id="modal-btn-agent" href="#" target="_blank" class="block w-full bg-[#38bdf8] text-black font-semibold py-3 rounded-lg mb-3 hover:bg-[#0ea5e9] transition-colors">
                Ouvrir le lien BBD
            </a>
            <a id="modal-btn-source" href="#" target="_blank" class="block w-full bg-[#2a2a2a] text-white font-semibold py-3 rounded-lg border border-gray-700 hover:bg-[#333] transition-colors">
                Ouvrir le lien Weidian
            </a>
            
            <button onclick="closeModal()" class="mt-4 text-sm text-gray-400 hover:text-white">Fermer</button>
        </div>
    </div>

    <script>
        let tousLesProduits = [];

        // 1. Charger les produits depuis le fichier JSON
        fetch('produits.json')
            .then(response => response.json())
            .then(data => {
                tousLesProduits = data;
                afficherProduits(tousLesProduits);
            })
            .catch(err => console.error("Erreur lors du chargement des produits:", err));

        // 2. Fonction pour afficher les cartes sur l'écran
        function afficherProduits(produits) {
            const grid = document.getElementById('grid-produits');
            grid.innerHTML = ''; // On vide la grille

            produits.forEach(prod => {
                const card = document.createElement('div');
                card.className = "bg-[#1c1c1c] rounded-lg overflow-hidden border border-gray-800 cursor-pointer hover:border-gray-600 transition-all relative";
                card.onclick = () => openModal(prod);
                
                card.innerHTML = `
                    <div class="absolute top-2 left-2 bg-[#10b981] text-xs font-bold px-2 py-0.5 rounded text-white">${prod.prix}</div>
                    <img src="${prod.image}" class="w-full h-40 object-cover bg-neutral-800" alt="${prod.nom}">
                    <div class="p-3">
                        <h4 class="font-semibold text-sm truncate text-white">${prod.nom}</h4>
                        <div class="flex space-x-2 mt-2">
                            <span class="text-[10px] bg-blue-900/50 text-blue-300 px-1.5 py-0.5 rounded font-bold">${prod.categorie}</span>
                            <span class="text-[10px] bg-gray-800 text-gray-400 px-1.5 py-0.5 rounded font-bold">${prod.vendeur}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 3. Gestion de la Pop-up au clic
        function openModal(prod) {
            document.getElementById('modal-title').innerText = prod.nom;
            document.getElementById('modal-meta').innerText = `Catégorie : ${prod.categorie} • Vendeur : ${prod.vendeur}`;
            document.getElementById('modal-btn-agent').href = prod.lienAgent;
            document.getElementById('modal-btn-source').href = prod.lienSource;
            document.getElementById('product-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.remove('active');
        }

        // 4. Barre de recherche fonctionnelle
        document.getElementById('search').addEventListener('input', (e) => {
            const recherche = e.target.value.toLowerCase();
            const produitsFiltrés = tousLesProduits.filter(p => p.nom.toLowerCase().includes(recherche));
            afficherProduits(produitsFiltrés);
        });
    </script>
</body>
</html>
